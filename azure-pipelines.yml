trigger:
- master

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Override in the pipeline UI or a Variable Group.
  # If left empty, defaults are resolved at runtime (see "Resolve NPM registry" step).
  ADO_ORGANIZATION: ''    # default: extracted from System.CollectionUri
  ADO_PROJECT: ''         # default: System.TeamProject (used only for project-scoped feeds)
  ADO_FEED: 'swf-ai-toolkit'
  ADO_FEED_SCOPE: 'organization'  # 'organization' or 'project'

steps:
- checkout: self

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    ORG="${ADO_ORGANIZATION:-}"
    if [ -z "$ORG" ]; then
      # System.CollectionUri is https://dev.azure.com/OrgName/ — extract OrgName
      ORG=$(echo "$(System.CollectionUri)" | sed 's|https://dev.azure.com/||;s|/$||')
    fi

    FEED="${ADO_FEED:-swf-ai-toolkit}"
    SCOPE="${ADO_FEED_SCOPE:-organization}"

    if [ "$SCOPE" = "project" ]; then
      PROJ="${ADO_PROJECT:-}"
      [ -z "$PROJ" ] && PROJ="$(System.TeamProject)"
      REGISTRY="https://pkgs.dev.azure.com/${ORG}/${PROJ}/_packaging/${FEED}/npm/registry/"
    else
      REGISTRY="https://pkgs.dev.azure.com/${ORG}/_packaging/${FEED}/npm/registry/"
    fi

    echo "##vso[task.setvariable variable=NPM_REGISTRY]${REGISTRY}"
    echo "Resolved registry: ${REGISTRY}"
  displayName: 'Resolve NPM registry URL'

- script: |
    cat > .npmrc <<EOF
    registry=$(NPM_REGISTRY)
    EOF
  displayName: 'Create .npmrc skeleton'

- task: NpmAuthenticate@0
  inputs:
    workingFile: '.npmrc'
  displayName: 'Authenticate npm to Azure Artifacts'

- script: npm version "0.1.$(Build.BuildId)" --no-git-tag-version --allow-same-version
  displayName: 'Set package version from Build.BuildId'

- script: npm publish --userconfig .npmrc
  displayName: 'Publish package'
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
